openapi: 3.0.3
info:
  title: AIDetector API
  version: 0.2.0
  description: Active contract baseline for auth, detection, history, quota, and phase-1 admin APIs.
servers:
  - url: https://api.example.com
    description: Production
  - url: http://localhost:8000
    description: Local
tags:
  - name: auth
  - name: quota
  - name: detection
  - name: history
  - name: admin
paths:
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: User login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: Register user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Register success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '409':
          description: Email or name conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/guest:
    post:
      tags: [auth]
      summary: Issue guest token
      operationId: guestLogin
      responses:
        '200':
          description: Guest token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
  /api/v1/auth/me:
    get:
      tags: [auth]
      summary: Get current user
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/me/profile:
    patch:
      tags: [auth]
      summary: Update current user profile
      operationId: updateMyProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/quota:
    get:
      tags: [quota]
      summary: Get daily quota snapshot
      operationId: getQuota
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Quota snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/detect:
    post:
      tags: [detection]
      summary: Submit detection task
      operationId: detectText
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetectRequest'
      responses:
        '200':
          description: Detection accepted and persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Daily quota exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Downstream detection service failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/history:
    get:
      tags: [history]
      summary: List current user history
      operationId: listHistory
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort
          in: query
          schema:
            type: string
            enum: [createdAt]
            default: createdAt
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: History list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [history]
      summary: Create history record
      operationId: createHistory
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HistoryRecordCreateRequest'
      responses:
        '201':
          description: History record created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryRecordResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [history]
      summary: Clear all current user history
      operationId: clearHistory
      security:
        - BearerAuth: []
      responses:
        '200':
          description: All history cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClearAllResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/history/batch-delete:
    post:
      tags: [history]
      summary: Batch delete history records
      operationId: batchDeleteHistory
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchDeleteRequest'
      responses:
        '200':
          description: Batch delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchDeleteResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/history/{historyId}:
    get:
      tags: [history]
      summary: Get history detail
      operationId: getHistory
      security:
        - BearerAuth: []
      parameters:
        - name: historyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: History detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryRecordResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: History not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/status:
    get:
      tags: [admin]
      summary: Verify admin access
      operationId: getAdminStatus
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Admin access confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStatusResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/overview:
    get:
      tags: [admin]
      summary: Get admin overview metrics
      operationId: getAdminOverview
      security:
        - BearerAuth: []
      parameters:
        - name: preset
          in: query
          schema:
            type: string
            enum: [today, week, month, quarter, year]
            default: week
      responses:
        '200':
          description: Overview data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOverviewResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/users:
    get:
      tags: [admin]
      summary: List users for admin
      operationId: listAdminUsers
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: systemRole
          in: query
          schema:
            $ref: '#/components/schemas/UserSystemRole'
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: planTier
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [createdAt, email, creditsRemaining]
            default: createdAt
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/users/{userId}:
    get:
      tags: [admin]
      summary: Get user detail for admin
      operationId: getAdminUser
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserDetailResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [admin]
      summary: Update admin-managed user fields
      operationId: updateAdminUser
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
      responses:
        '200':
          description: Updated user detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserDetailResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/users/{userId}/credits:
    post:
      tags: [admin]
      summary: Adjust user credits
      operationId: adjustAdminUserCredits
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserCreditsAdjustRequest'
      responses:
        '200':
          description: Updated credit snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserCreditsAdjustResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/detections:
    get:
      tags: [admin]
      summary: List detections for admin
      operationId: listAdminDetections
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: integer
        - name: actorType
          in: query
          schema:
            type: string
            enum: [user, guest]
        - name: label
          in: query
          schema:
            type: string
            enum: [ai, mixed, human]
        - name: function
          in: query
          schema:
            $ref: '#/components/schemas/DetectionFunction'
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - name: sort
          in: query
          schema:
            type: string
            enum: [createdAt, score, charsUsed]
            default: createdAt
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Detection list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDetectionListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/detections/{detectionId}:
    get:
      tags: [admin]
      summary: Get detection detail for admin
      operationId: getAdminDetection
      security:
        - BearerAuth: []
      parameters:
        - name: detectionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detection detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDetectionDetailResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Detection not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [admin]
      summary: Delete detection record
      operationId: deleteAdminDetection
      security:
        - BearerAuth: []
      parameters:
        - name: detectionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Detection not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
        - detail
      properties:
        code:
          oneOf:
            - type: integer
            - type: string
        message:
          type: string
        detail:
          nullable: true
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
            - type: string
    TokenResponse:
      type: object
      required:
        - accessToken
        - tokenType
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          example: bearer
    LoginRequest:
      type: object
      required:
        - identifier
        - password
      properties:
        identifier:
          type: string
          description: Email or account name
        password:
          type: string
          format: password
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        password:
          type: string
          format: password
          minLength: 8
    UserSystemRole:
      type: string
      enum: [VISITOR, INDIVIDUAL, TEAM_ADMIN, SYS_ADMIN]
    DetectionFunction:
      type: string
      enum: [scan, polish, translate, citation]
    UserProfile:
      type: object
      properties:
        firstName:
          type: string
          nullable: true
        surname:
          type: string
          nullable: true
        organization:
          type: string
          nullable: true
        jobRole:
          type: string
          nullable: true
        industry:
          type: string
          nullable: true
    UserProfileUpdateRequest:
      type: object
      properties:
        firstName:
          type: string
          nullable: true
        surname:
          type: string
          nullable: true
        organization:
          type: string
          nullable: true
        jobRole:
          type: string
          nullable: true
        industry:
          type: string
          nullable: true
    UserResponse:
      type: object
      required:
        - id
        - email
        - name
        - systemRole
        - isActive
        - planTier
        - creditsRemaining
        - createdAt
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        name:
          type: string
        systemRole:
          $ref: '#/components/schemas/UserSystemRole'
        isActive:
          type: boolean
        planTier:
          type: string
        creditsRemaining:
          type: integer
        createdAt:
          type: string
          format: date-time
        profile:
          $ref: '#/components/schemas/UserProfile'
    QuotaResponse:
      type: object
      required:
        - actorType
        - limit
        - usedToday
        - remaining
      properties:
        actorType:
          type: string
          enum: [user, guest]
        limit:
          type: integer
        usedToday:
          type: integer
        remaining:
          type: integer
    DetectRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
        functions:
          type: array
          items:
            $ref: '#/components/schemas/DetectionFunction'
          default: [scan]
    DetectResponse:
      type: object
      required:
        - detectionId
        - historyId
        - label
        - score
        - currentCredits
      properties:
        detectionId:
          type: integer
        historyId:
          type: integer
        label:
          type: string
          enum: [ai, mixed, human]
        score:
          type: number
          format: float
          minimum: 0
          maximum: 1
        modelName:
          type: string
          nullable: true
        rawScore:
          type: number
          format: float
          nullable: true
        threshold:
          type: number
          format: float
          nullable: true
        currentCredits:
          type: integer
    HistorySummary:
      type: object
      required:
        - ai
        - mixed
        - human
      properties:
        ai:
          type: integer
          minimum: 0
          maximum: 100
        mixed:
          type: integer
          minimum: 0
          maximum: 100
        human:
          type: integer
          minimum: 0
          maximum: 100
    HistorySentence:
      type: object
      required:
        - id
        - text
        - raw
        - type
        - probability
        - score
        - reason
        - suggestion
      properties:
        id:
          type: string
        text:
          type: string
        raw:
          type: string
        type:
          type: string
          enum: [ai, mixed, human]
        probability:
          type: number
          format: float
          minimum: 0
          maximum: 1
        score:
          type: integer
          minimum: 0
          maximum: 100
        reason:
          type: string
        suggestion:
          type: string
    HistoryCitation:
      type: object
      required:
        - id
        - text
        - source
      properties:
        id:
          type: string
        text:
          type: string
        source:
          type: string
    HistoryAnalysis:
      type: object
      required:
        - summary
        - sentences
        - translation
        - polish
        - citations
        - aiLikelyCount
        - highlightedHtml
      properties:
        summary:
          $ref: '#/components/schemas/HistorySummary'
        sentences:
          type: array
          items:
            $ref: '#/components/schemas/HistorySentence'
        translation:
          type: string
        polish:
          type: string
        citations:
          type: array
          items:
            $ref: '#/components/schemas/HistoryCitation'
        aiLikelyCount:
          type: integer
          minimum: 0
        highlightedHtml:
          type: string
    HistoryRecordCreateRequest:
      type: object
      required:
        - title
        - functions
        - inputText
        - editorHtml
      properties:
        title:
          type: string
          maxLength: 255
        functions:
          type: array
          items:
            $ref: '#/components/schemas/DetectionFunction'
        inputText:
          type: string
          maxLength: 50000
        editorHtml:
          type: string
        analysis:
          $ref: '#/components/schemas/HistoryAnalysis'
          nullable: true
    HistoryRecordUpdateRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          maxLength: 255
    HistoryRecordResponse:
      type: object
      required:
        - id
        - userId
        - createdAt
        - functions
        - inputText
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        functions:
          type: array
          items:
            $ref: '#/components/schemas/DetectionFunction'
        inputText:
          type: string
        editorHtml:
          type: string
          nullable: true
        analysis:
          $ref: '#/components/schemas/HistoryAnalysis'
          nullable: true
    HistoryListResponse:
      type: object
      required:
        - items
        - page
        - pageSize
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/HistoryRecordResponse'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    BatchDeleteRequest:
      type: object
      required:
        - ids
      properties:
        ids:
          type: array
          minItems: 1
          items:
            type: integer
    BatchDeleteResponse:
      type: object
      required:
        - deletedCount
        - failedIds
      properties:
        deletedCount:
          type: integer
        failedIds:
          type: array
          items:
            type: integer
    ClearAllResponse:
      type: object
      required:
        - deletedCount
      properties:
        deletedCount:
          type: integer
    AdminStatusResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
